## Nginx config for Jelly Follow
## Domains: go.jelly.uz, api.follow.jelly.uz

server {
    listen 80;
    server_name go.jelly.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name go.jelly.uz;

    ssl_certificate /etc/letsencrypt/live/go.jelly.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go.jelly.uz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name api.follow.jelly.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.follow.jelly.uz;

    ssl_certificate /etc/letsencrypt/live/api.follow.jelly.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.follow.jelly.uz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /static/ {
        alias /home/jelly/jelly-follow/static/;
        expires 1d;
    }
}
