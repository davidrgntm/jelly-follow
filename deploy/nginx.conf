# Jelly Follow — Nginx Configuration
# Copy to: /etc/nginx/sites-available/jelly-follow
# Then: ln -s /etc/nginx/sites-available/jelly-follow /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d follow.jelly.uz -d go.jelly.uz -d api.follow.jelly.uz

upstream jelly_backend {
    server 127.0.0.1:8000;
}

# Main domain — web admin + static
server {
    listen 80;
    server_name follow.jelly.uz;

    location / {
        proxy_pass http://jelly_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/jelly/jelly-follow/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Tracking domain — QR redirects
server {
    listen 80;
    server_name go.jelly.uz;

    location / {
        proxy_pass http://jelly_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

# API domain
server {
    listen 80;
    server_name api.follow.jelly.uz;

    client_max_body_size 10M;

    location / {
        proxy_pass http://jelly_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook endpoint
    location /webhook {
        proxy_pass http://jelly_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
